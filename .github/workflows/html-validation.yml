name: HTML Validation

on:
  push:
    paths:
      - "**/*.html"
  pull_request:
    paths:
      - "**/*.html"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install html-validate
        run: npm install -g html-validate

      - name: Run HTML validation
        run: html-validate "**/*.html"
