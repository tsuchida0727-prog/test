<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>
  <script src="script.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" class="active">Contact</a>
    <a href="#">Blog</a>
    <button class="theme-toggle" id="theme-toggle">☀ Light</button>
  </nav>
  <div class="container">
    <h1>Contact</h1>
    <form>
      <label>
        お名前
        <input type="text" name="name" placeholder="山田 太郎">
      </label>
      <label>
        メールアドレス
        <input type="email" name="email" placeholder="example@email.com">
      </label>
      <label>
        件名
        <input type="text" name="subject" placeholder="お問い合わせの件名">
      </label>
      <label>
        メッセージ
        <textarea name="message" placeholder="お問い合わせ内容をご記入ください"></textarea>
      </label>
      <button type="submit">送信する</button>
    </form>
  </div>
</body>
</html>
